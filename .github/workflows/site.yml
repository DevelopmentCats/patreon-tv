name: site

on:
  push:
    branches: [main, "scaffold/**", "feature/**"]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  pull_request:
    branches: [main]
    paths:
      - "site/**"

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Confirm key files exist in dist
        working-directory: site
        run: |
          test -f dist/index.html
          test -f dist/privacy/index.html
          test -f dist/terms/index.html
          test -f dist/support/index.html
          test -f dist/post/index.html
          test -f dist/creator/index.html
          test -f dist/robots.txt
          test -f dist/favicon.svg
          test -f dist/_headers
          test -f dist/_redirects
          test -f dist/.well-known/apple-app-site-association
          echo "All expected files present in dist/"
