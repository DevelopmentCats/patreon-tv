name: tvOS build

on:
  push:
    branches: [main, "scaffold/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (tvOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        # Runner images ship several Xcode versions at /Applications/Xcode_<v>.app;
        # pick the newest instead of hardcoding one that may not exist.
        run: |
          latest=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/tvos
        run: xcodegen generate

      - name: Generate placeholder brand assets
        working-directory: apps/tvos
        run: python3 scripts/generate-brand-assets.py

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/tvos/project.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Show available simulators
        run: xcrun simctl list devices available tvOS | head -20

      - name: Build
        working-directory: apps/tvos
        # xcodebuild's exit code is the source of truth — never masked by the
        # log-filtering grep (which previously ended in `|| true` and could
        # let a failed build pass).
        run: |
          set -o pipefail
          if ! xcodebuild \
            -project PatreonTV.xcodeproj \
            -scheme PatreonTV \
            -destination "platform=tvOS Simulator,name=Apple TV" \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            > build.log 2>&1; then
            echo "::error::xcodebuild build failed"
            tail -200 build.log
            exit 1
          fi
          grep -E "warning:|error:|BUILD" build.log || true

      - name: Test
        working-directory: apps/tvos
        run: |
          set -o pipefail
          if ! xcodebuild \
            -project PatreonTV.xcodeproj \
            -scheme PatreonTV \
            -destination "platform=tvOS Simulator,name=Apple TV" \
            -configuration Debug \
            test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            > test.log 2>&1; then
            echo "::error::xcodebuild test failed"
            tail -200 test.log
            exit 1
          fi
          grep -E "Test Case|Test Suite|passed|failed" test.log || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: apps/tvos/*.log
