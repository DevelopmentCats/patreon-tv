name = "patreon-tv"
compatibility_date = "2026-06-01"
pages_build_output_dir = "./dist"

# Cloudflare Pages preview builds live at patreon-tv.pages.dev
# Production custom domain (once you attach it): patreontv.com

[[kv_namespaces]]
binding = "PAIRING"
id = "5ea4a5a69593412b89bdc16c8e69cd48"
preview_id = "5ea4a5a69593412b89bdc16c8e69cd48"

# Environment variables (set via the Cloudflare dashboard or `wrangler pages secret put`)
# ------------------------------------------------------------------
# CONTACT_EMAIL           — support email shown on /contact
# PATREON_CLIENT_ID       — OAuth client id from patreon.com/portal/registration/register-clients
# PATREON_CLIENT_SECRET   — OAuth client secret
# PATREON_REDIRECT_URI    — https://patreontv.com/api/pairing/oauth/callback (or local dev URL)
# PAIRING_PUBLIC_ORIGIN   — https://patreontv.com (or http://127.0.0.1:8788 for local dev)
# PAIRING_SESSION_KEY     — REQUIRED in production: 32-byte base64 key that
#                           seals session cookies at rest in KV.
#                           Generate with: openssl rand -base64 32
